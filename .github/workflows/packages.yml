name: packages

on:
  pull_request:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Cache Prince release artifacts
        uses: actions/cache@v4
        with:
          path: downloads
          key: prince-artifacts-${{ hashFiles('versions.json') }}
      - name: Syntax-check the wrapper
        run: |
          node --check package/lib/index.js
          node --check package/lib/platform.js
          node --check package/bin/prince.js
          node --check tests/smoke.js
      - name: Download artifacts from princexml.com, verify checksums, build packages
        run: python scripts/build_packages.py
      - name: Check package contents
        run: |
          version=$(python3 -c "import json; print(json.load(open('versions.json'))['package_version'])")
          main="dist/prince-pdf-${version}.tgz"
          for f in package.json README.md LICENSE lib/index.js lib/index.d.ts bin/prince.js; do
            tar -tzf "$main" | grep -qx "package/$f" || { echo "$main missing $f" >&2; exit 1; }
          done
          for plat in dist/prince-pdf-*-"${version}".tgz; do
            for f in package.json _meta.json LICENSE-Prince.txt; do
              tar -tzf "$plat" | grep -qx "package/$f" || { echo "$plat missing $f" >&2; exit 1; }
            done
            tar -tzf "$plat" | grep -qE "^package/bin/prince(\.exe)?$" || { echo "$plat missing engine" >&2; exit 1; }
          done
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/*.tgz
          if-no-files-found: error

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x64,        key: linux-x64,        runner: ubuntu-24.04 }
          - { name: linux-arm64,      key: linux-arm64,      runner: ubuntu-24.04-arm }
          # The musl package is tested via `docker run` rather than a
          # job-level alpine container: JavaScript-based actions (checkout,
          # download-artifact) need glibc and fail inside musl containers.
          # No linux-x64-musl entry: no self-contained musl x86-64 engine
          # build exists yet (see the TODO in scripts/update_versions.py).
          - { name: linux-arm64-musl, key: linux-arm64-musl, runner: ubuntu-24.04-arm, musl: true }
          - { name: macos,            key: darwin,           runner: macos-14 }
          - { name: windows-x64,      key: win32-x64,        runner: windows-latest }
          - { name: windows-arm64,    key: win32-arm64,      runner: windows-11-arm }
    name: test (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist

      - name: Install packages and run smoke test (Alpine)
        if: ${{ matrix.musl }}
        run: |
          docker run --rm -v "$PWD/dist:/dist:ro" -v "$PWD/tests:/tests:ro" \
            node:22-alpine sh -ec '
              apk add --no-cache fontconfig ttf-dejavu >/dev/null
              mkdir /try && cd /try && npm init -y >/dev/null
              npm install --no-audit --no-fund \
                /dist/prince-pdf-[0-9]*.tgz \
                /dist/prince-pdf-${{ matrix.key }}-[0-9]*.tgz
              node /tests/smoke.js'

      - uses: actions/setup-node@v4
        if: ${{ !matrix.musl }}
        with:
          node-version: "22"
      - name: Install packages and run smoke test
        if: ${{ !matrix.musl }}
        shell: bash
        run: |
          mkdir try && cd try && npm init -y >/dev/null
          npm install --no-audit --no-fund \
            ../dist/prince-pdf-[0-9]*.tgz \
            ../dist/prince-pdf-${{ matrix.key }}-[0-9]*.tgz
          node ../tests/smoke.js

      # Prove the package installs and runs with no network access at all:
      # this is the property that makes it usable in registry-only
      # sandboxes. The image is prepared (online) with the documented
      # system packages - fonts, and libfontconfig1 which the x86-64
      # engine links dynamically - then everything runs with networking
      # disabled. Both tarballs are installed as direct dependencies with
      # --omit=optional: npm would otherwise contact the registry for the
      # metadata of the other platforms' optionalDependencies, which is
      # exactly what a registry-less environment cannot do.
      - name: Offline install check
        if: matrix.name == 'linux-x64'
        run: |
          docker build -t offline-base - <<'EOF'
          FROM node:22-slim
          RUN apt-get update && \
              apt-get install -y --no-install-recommends libfontconfig1 fonts-dejavu-core && \
              rm -rf /var/lib/apt/lists/*
          EOF
          docker run --rm --network=none \
            -v "$PWD/dist:/dist:ro" -v "$PWD/tests:/tests:ro" offline-base \
            sh -ec '
              mkdir /try && cd /try && npm init -y >/dev/null
              npm install --no-audit --no-fund --omit=optional \
                /dist/prince-pdf-[0-9]*.tgz \
                /dist/prince-pdf-linux-x64-[0-9]*.tgz
              node /tests/smoke.js'

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-24.04
    environment: npm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 24 bundles it.
      # No registry-url here: setup-node would write an .npmrc _authToken
      # entry reading the (unset) NODE_AUTH_TOKEN variable, and npm then
      # sends empty credentials instead of attempting the OIDC exchange.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Check tag matches the package version
        run: |
          version=$(python3 -c "import json; print(json.load(open('versions.json'))['package_version'])")
          if [ "${GITHUB_REF_NAME}" != "v${version}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match package version ${version}" >&2
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist
      # Platform packages first, so the main package's exact-version
      # optionalDependencies resolve as soon as it appears. Pre-release
      # versions (semver `-dev.` / `-beta.`) go under the `next` dist-tag
      # so `latest` always points at a stable release.
      - name: Publish to npm
        run: |
          version=$(python3 -c "import json; print(json.load(open('versions.json'))['package_version'])")
          case "$version" in
            *-*) tag=next ;;
            *)   tag=latest ;;
          esac
          echo "publishing $version with dist-tag $tag"
          for f in dist/prince-pdf-*-"${version}".tgz; do
            npm publish "./$f" --access public --tag "$tag"
          done
          npm publish "./dist/prince-pdf-${version}.tgz" --access public --tag "$tag"
